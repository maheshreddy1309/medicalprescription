<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processing Prescription</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
    }
    .spinner {
      width: 52px;
      height: 52px;
      border: 5px solid rgba(255,255,255,0.15);
      border-top-color: #58a6ff;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h2 {
      margin: 0 0 10px;
    }
    p {
      color: #8b949e;
      margin: 0 0 18px;
    }
    .error {
      margin-top: 18px;
      color: #f85149;
      background: rgba(248,81,73,0.08);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 10px;
      padding: 12px;
      display: none;
    }
    a {
      color: #58a6ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>Processing your prescription...</h2>
    <p>Please wait while OCR and medicine detection are running.</p>

    <div id="error-box" class="error"></div>

    <p style="margin-top:20px;">
      <a href="/dashboard">Back to dashboard</a>
    </p>
  </div>

  <script>
    const docId = "{{ doc._id }}";

    async function pollStatus() {
      try {
        const response = await fetch(`/api/task_status/${docId}`, {
          method: "GET",
          headers: {
            "Accept": "application/json"
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (data.status === "done") {
          window.location.href = `/scan/${docId}`;
          return;
        }

        if (data.status === "error") {
          const box = document.getElementById("error-box");
          box.style.display = "block";
          box.textContent = data.error_msg || "Processing failed.";
          return;
        }

        setTimeout(pollStatus, 2000);
      } catch (err) {
        const box = document.getElementById("error-box");
        box.style.display = "block";
        box.textContent = "Failed to connect to task status API.";
      }
    }

    pollStatus();
  </script>
</body>
</html>
