<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedScan — Register</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --surface2: #1e2530;
    --border:   #30363d;
    --accent:   #58a6ff;
    --success:  #3fb950;
    --danger:   #f85149;
    --text:     #e6edf3;
    --muted:    #8b949e;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(63,185,80,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(63,185,80,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, rgba(63,185,80,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #1c8a3a, var(--success));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
  }

  h2 {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 13px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }

  input:focus {
    border-color: var(--success);
    box-shadow: 0 0 0 3px rgba(63,185,80,0.12);
  }

  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 5px;
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1c8a3a, var(--success));
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
  }

  .btn:hover { opacity: 0.9; }

  .error-box {
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    color: var(--danger);
    margin-bottom: 20px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span { font-size: 12px; color: var(--muted); }

  .footer-text {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
  }

  .footer-text a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💊</div>
    <span class="logo-text">MedScan</span>
  </div>

  <h2>Create account</h2>
  <p class="subtitle">Start analyzing prescriptions instantly</p>

  {% if error %}
  <div class="error-box">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Choose a username" required minlength="3" autocomplete="username">
      <p class="hint">Minimum 3 characters</p>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Create a password" required minlength="6" autocomplete="new-password">
      <p class="hint">Minimum 6 characters</p>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" name="confirm_password" placeholder="Repeat your password" required autocomplete="new-password">
    </div>
    <button type="submit" class="btn">Create Account</button>
  </form>

  <div class="divider"><span>or</span></div>
  <p class="footer-text">Already have an account? <a href="/login">Sign in</a></p>
</div>
</body>
</html>
